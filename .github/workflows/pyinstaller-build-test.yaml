name: PyInstaller build test

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_id: linux-x64
          - os: ubuntu-24.04-arm
            platform_id: linux-arm64
          - os: windows-latest
            platform_id: windows-x64
          - os: windows-11-arm
            platform_id: windows-arm64
          - os: macos-26-intel
            platform_id: macos-intel
          - os: macos-latest
            platform_id: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux GUI runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb tk tcl

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies and dev tools
        shell: bash
        run: uv sync --locked --all-extras

      - name: Read project version
        id: version
        shell: bash
        run: echo "version=$(uv run python scripts/get_project_version.py)" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        shell: bash
        run: uv run pyinstaller --noconfirm --clean sbom-viewer.spec

      - name: Determine packaged app path
        id: app-path
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "app_dir=dist/SBOM Viewer.app" >> "$GITHUB_OUTPUT"
          else
            echo "app_dir=dist/sbom-viewer" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke test packaged app on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a uv run python scripts/smoke_test_pyinstaller.py --app-dir "${{ steps.app-path.outputs.app_dir }}"

      - name: Smoke test packaged app on non-Linux
        if: runner.os != 'Linux'
        shell: bash
        run: uv run python scripts/smoke_test_pyinstaller.py --app-dir "${{ steps.app-path.outputs.app_dir }}"

      - name: Create versioned archive
        shell: bash
        run: |
          mkdir -p packaged
          uv run python scripts/package_pyinstaller_dist.py \
            --app-dir "${{ steps.app-path.outputs.app_dir }}" \
            --platform-id "${{ matrix.platform_id }}" \
            --version "${{ steps.version.outputs.version }}" \
            --output-dir packaged

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-viewer-${{ steps.version.outputs.version }}-${{ matrix.platform_id }}
          path: packaged/*
          if-no-files-found: error
          retention-days: 7
